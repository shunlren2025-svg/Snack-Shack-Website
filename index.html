<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Snack Shack</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Student lunch-time snack club</p>
        <h1>The Snack Shack</h1>
      </div>
      <div class="hours" aria-label="Opening hours">
        <span>Open today</span>
        <strong>11:30 AM - 1:20 PM</strong>
      </div>
    </header>

    <main>
      <section class="order-tools" aria-label="Menu tools">
        <label class="search-field" for="snack-search">
          <span>Search snacks</span>
          <input
            id="snack-search"
            type="search"
            autocomplete="off"
            placeholder="Try chips, cookies, drink..."
          />
        </label>

        <div class="filter-row" aria-label="Snack filters">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="in-stock">In stock</button>
          <button class="filter-button" type="button" data-filter="drinks">Drinks</button>
          <button class="filter-button" type="button" data-filter="sweet">Sweet</button>
          <button class="filter-button" type="button" data-filter="salty">Salty</button>
        </div>
      </section>

      <section class="status-strip" aria-live="polite">
        <p id="result-count">Loading snacks...</p>
        <div class="cart-summary" aria-label="Current order">
          <span id="cart-count">0 items</span>
          <strong id="cart-total">$0.00</strong>
          <button id="open-checkout" class="quiet-button" type="button">Checkout</button>
        </div>
      </section>

      <section id="menu-grid" class="menu-grid" aria-label="Snack menu"></section>

      <p id="empty-state" class="empty-state" hidden>
        No snacks match that search. Clear the search or try a shorter word.
      </p>
    </main>

    <dialog id="checkout-dialog" class="checkout-dialog">
      <form id="checkout-form" method="dialog">
        <div class="dialog-head">
          <div>
            <p class="eyebrow">Quick checkout</p>
            <h2 id="checkout-title">Checkout</h2>
          </div>
          <button class="icon-button" type="button" id="close-checkout" aria-label="Close checkout">x</button>
        </div>

        <div id="order-items" class="order-items" aria-label="Order items"></div>

        <div class="order-total">
          <span>Total</span>
          <strong id="order-total">$0.00</strong>
        </div>

        <div class="form-grid">
          <label>
            Your name
            <input id="student-name" name="studentName" type="text" autocomplete="name" required />
          </label>
          <label>
            Deliver to
            <input id="delivery-location" name="deliveryLocation" type="text" placeholder="Table, room, or lunch spot" required />
          </label>
          <label>
            Payment
            <select id="payment-method" name="paymentMethod" required>
              <option value="Cash on delivery">Cash on delivery</option>
              <option value="Student card">Student card</option>
              <option value="Prepaid snack pass">Prepaid snack pass</option>
            </select>
          </label>
        </div>

        <button class="primary-button full-width" type="submit">Place order</button>
        <p class="checkout-note">Your order is prepared for lunch-time delivery.</p>
      </form>
    </dialog>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="script.js"></script>
  </body>
</html>
